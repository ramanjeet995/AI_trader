name: Full Scan (9 AM + 4:30 PM ET, DST-aware)

on:
  schedule:
    # 9:00 AM ET — fires at both EDT and EST UTC times
    - cron: "0 13 * * 1-5"   # EDT: 9 AM ET   |  EST: 8 AM ET (script will skip)
    - cron: "0 14 * * 1-5"   # EDT: 10 AM ET (skip) | EST: 9 AM ET
    # 4:30 PM ET — same dual-cron approach
    - cron: "30 20 * * 1-5"  # EDT: 4:30 PM ET  | EST: 3:30 PM ET (skip)
    - cron: "30 21 * * 1-5"  # EDT: 5:30 PM ET (skip) | EST: 4:30 PM ET

  workflow_dispatch:
    inputs:
      skip_time_guard:
        description: "Skip ET time-window check (run anytime)"
        type: boolean
        default: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Cache HuggingFace models (FinBERT)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-finbert-v1

      - name: Cache earnings calendar
        uses: actions/cache@v4
        with:
          path: earnings_cache.json
          key: earnings-${{ github.run_id }}
          restore-keys: earnings-

      - name: Install dependencies
        run: |
          # CPU-only torch is ~200MB vs ~900MB for the default CUDA build.
          # Saves 3-5 min on cold installs and avoids runner disk pressure.
          pip install --index-url https://download.pytorch.org/whl/cpu torch || \
            echo "[warn] torch install failed — FinBERT will fall back to keyword sentiment"
          pip install -r requirements.txt

      - name: Run full scan
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER: "true"
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: "rfgenius95@gmail.com"
          SKIP_TIME_GUARD: ${{ inputs.skip_time_guard || 'false' }}
        run: python main.py

      - name: Commit scan log
        run: |
          git config user.name "AI Trader Bot"
          git config user.email "bot@aitrader.com"
          git pull --rebase origin main || true
          git add scan_log.json scan_log.md
          git diff --staged --quiet || git commit -m "scan log update [skip ci]"
          git push
