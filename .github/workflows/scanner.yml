name: Full Scan (9 AM + 4:30 PM ET)

on:
  schedule:
    # 9:00 AM ET  = 13:00 UTC (weekdays)
    - cron: "0 13 * * 1-5"
    # 4:30 PM ET  = 20:30 UTC (weekdays)
    - cron: "30 20 * * 1-5"

  workflow_dispatch:   # manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full scan
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER: "true"
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: "rfgenius95@gmail.com"
        run: python main.py

      - name: Commit scan log
        run: |
          git config user.name "AI Trader Bot"
          git config user.email "bot@aitrader.com"
          git add scan_log.json
          git diff --staged --quiet || git commit -m "scan log update [skip ci]"
          git push
