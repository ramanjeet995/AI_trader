name: News Check (11/1/3 ET, DST-aware)

on:
  # Schedule DISABLED — all scans now run on Raspberry Pi cron.
  # Keep workflow_dispatch so we can manually trigger as backup.
  # schedule:
  #   - cron: "53 14 * * 1-5"  # EDT: 10:53 AM ET
  #   - cron: "53 15 * * 1-5"  # EST: 10:53 AM ET
  #   - cron: "53 16 * * 1-5"  # EDT: 12:53 PM ET
  #   - cron: "53 17 * * 1-5"  # EST: 12:53 PM ET
  #   - cron: "53 18 * * 1-5"  # EDT: 2:53 PM ET
  #   - cron: "53 19 * * 1-5"  # EST: 2:53 PM ET

  workflow_dispatch:
    inputs:
      skip_time_guard:
        description: "Skip ET time-window check (run anytime)"
        type: boolean
        default: true

jobs:
  news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Cache HuggingFace models (FinBERT)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-finbert-v1

      - name: Cache earnings calendar
        uses: actions/cache@v4
        with:
          path: earnings_cache.json
          key: earnings-${{ github.run_id }}
          restore-keys: earnings-

      - name: Install dependencies
        run: |
          # CPU-only torch is ~200MB vs ~900MB for the default CUDA build.
          pip install --index-url https://download.pytorch.org/whl/cpu torch || \
            echo "[warn] torch install failed — FinBERT will fall back to keyword sentiment"
          pip install -r requirements.txt

      - name: Run news check
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER: "true"
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: "rfgenius95@gmail.com"
          MODE: "NEWS"
          SKIP_TIME_GUARD: ${{ inputs.skip_time_guard || 'false' }}
        run: python main.py

      - name: Commit scan log
        run: |
          git config user.name "AI Trader Bot"
          git config user.email "bot@aitrader.com"
          git pull --rebase origin main || true
          git add scan_log.json scan_log.md
          git diff --staged --quiet || git commit -m "scan log update [skip ci]"
          git push
