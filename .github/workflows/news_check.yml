name: News Check (Every 2 Hours)

on:
  schedule:
    # 11:00 AM ET = 15:00 UTC (weekdays)
    - cron: "0 15 * * 1-5"
    # 1:00 PM ET  = 17:00 UTC (weekdays)
    - cron: "0 17 * * 1-5"
    # 3:00 PM ET  = 19:00 UTC (weekdays)
    - cron: "0 19 * * 1-5"

  workflow_dispatch:   # manual trigger from GitHub UI

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news check
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
          ALPACA_PAPER: "true"
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: "rfgenius95@gmail.com"
          MODE: "NEWS"
        run: python main.py

      - name: Commit scan log
        run: |
          git config user.name "AI Trader Bot"
          git config user.email "bot@aitrader.com"
          git add scan_log.json
          git diff --staged --quiet || git commit -m "scan log update [skip ci]"
          git push
